<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <div class="container admin-container">
        <h1 class="menu-title admin-panel-title">Math Quiz Admin Panel</h1>
        <div class="menu-content admin-login-card" style="max-width:420px;margin:0 auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <h2>Administrator Login</h2>
                <button class="menu-btn menu-btn-secondary" onclick="backToGame()" style="padding: 8px 14px; font-size: .9rem;">Back to Game</button>
            </div>
            <input type="password" id="admin-password" placeholder="Enter admin password" class="menu-btn admin-input" style="width:100%;margin-bottom:12px;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                <input type="checkbox" id="show-password-checkbox" onchange="toggleAdminPassword()" />
                <label for="show-password-checkbox" style="font-size:.9rem; color:#34426e;">Show Password</label>
            </div>
            <button class="menu-btn" onclick="adminLogin()">Login</button>
            <p id="login-error" class="error-text">Incorrect password.</p>
        </div>
        <div id="admin-panel" class="admin-panel-card" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <h2>Manage Questions</h2>
                <button class="menu-btn menu-btn-secondary" onclick="backToGame()" style="padding: 8px 14px; font-size: .9rem;">Back to Game</button>
            </div>
            <div class="d-flex" style="margin-bottom:12px;align-items:center;gap:10px;">
                <label for="difficulty-select" class="admin-label">Difficulty:</label>
                <select id="difficulty-select" class="menu-btn admin-select" style="width:auto;">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <input type="number" id="new-level" placeholder="Question Level (1, 2, 3...)" class="menu-btn admin-input" style="width:100%;margin-bottom:10px;" min="1" value="1">
            <input type="text" id="new-word" placeholder="Correct Answer" class="menu-btn admin-input" style="width:100%;margin-bottom:10px;">
            <input type="text" id="new-hint" placeholder="Question" class="menu-btn admin-input" style="width:100%;margin-bottom:10px;">
            <button class="menu-btn menu-btn-primary" onclick="addWord()">Add Question</button>
            <div class="question-summary" style="margin-bottom:12px;">
                <strong>Showing questions for difficulty: </strong>
                <span id="current-difficulty" style="font-weight:700;color:#1a73e8;">Normal</span>
            </div>
            <ul id="word-list" class="admin-list"></ul>
            <h2 style="margin-top:30px;">Leaderboard</h2>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="menu-btn" onclick="loadLeaderboard()">Refresh Leaderboard</button>
                <button class="menu-btn menu-btn-secondary" onclick="clearLeaderboardAdmin()">Clear Leaderboard</button>
            </div>
            <table id="leaderboard-table" style="width:100%;margin-top:10px;border-collapse:collapse;">
                <thead>
                    <tr style="background:#eee;"><th>Rank</th><th>Name</th><th>Score</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            
            <h2 style="margin-top:30px;">Scoring System Configuration</h2>
            <div style="background:#f0f4ff; padding:15px; border-radius:8px; margin-bottom:15px;">
                <div style="margin-bottom:15px;">
                    <label class="admin-label">Base Score (Correct Answer):</label>
                    <input type="number" id="base-score-correct" class="menu-btn admin-input" style="width:100%;margin-bottom:8px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label class="admin-label">Attempt Penalty (per wrong attempt):</label>
                    <input type="number" id="attempt-penalty" class="menu-btn admin-input" style="width:100%;margin-bottom:8px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label class="admin-label">Time Bonus (points per second - hard only):</label>
                    <input type="number" id="time-bonus" class="menu-btn admin-input" style="width:100%;margin-bottom:8px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label class="admin-label">Level Multiplier Increment (per level):</label>
                    <input type="number" id="level-multiplier" class="menu-btn admin-input" step="0.1" style="width:100%;margin-bottom:8px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label class="admin-label">Difficulty Multipliers:</label>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                        <div>
                            <label style="font-size:0.9em;">Easy:</label>
                            <input type="number" id="multiplier-easy" class="menu-btn admin-input" step="0.1" style="width:100%;">
                        </div>
                        <div>
                            <label style="font-size:0.9em;">Normal:</label>
                            <input type="number" id="multiplier-normal" class="menu-btn admin-input" step="0.1" style="width:100%;">
                        </div>
                        <div>
                            <label style="font-size:0.9em;">Hard:</label>
                            <input type="number" id="multiplier-hard" class="menu-btn admin-input" step="0.1" style="width:100%;">
                        </div>
                    </div>
                </div>
                <button class="menu-btn menu-btn-primary" onclick="loadScoringConfig()" style="width:100%;margin-bottom:8px;">📋 Load Current Config</button>
                <button class="menu-btn" onclick="saveScoringConfig()" style="width:100%;">💾 Save Scoring Config</button>
            </div>
            <div id="scoring-display" style="background:#f9f9f9; padding:15px; border-radius:8px; border-left:4px solid #1a73e8;">
                <h3 style="margin-top:0;color:#1a73e8;">Current Scoring Settings:</h3>
                <pre id="scoring-preview" style="font-size:0.9em; max-height:200px; overflow-y:auto;"></pre>
            </div>
        </div>
    </div>
    <script src="scoring-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
